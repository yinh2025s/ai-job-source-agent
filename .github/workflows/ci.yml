name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  supported-python:
    name: Python ${{ matrix.python-version }} contracts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Validate supported runtime
        run: python scripts/check_runtime.py
      - name: Run tests
        run: python -m unittest discover -s tests

  release-offline:
    name: CPython 3.12 offline release gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run offline release gates
        run: make offline-gates PYTHON=python
